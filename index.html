<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSMP News | Las noticias más importantes del primer server multilingüe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/vuex@4/dist/vuex.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top" data-bs-theme="light">
        <div class="container">
            <router-link class="navbar-brand fw-bold" to="/"><img src="https://static.wikia.nocookie.net/qsmp/images/1/1f/QSMP_Info_Logo.png/revision/latest/thumbnail/width/360/height/360?cb=20240204041553" alt="QSMP Logo" width="30" height="30">QSMP News</router-link>
            <div class="navbar-nav ms-auto align-items-center">
                <router-link class="nav-link px-3" to="/">Inicio</router-link>
                <div v-if="!user">
                    <router-link class="btn btn-primary btn-sm rounded-pill px-4" to="/login">Iniciar Sesión</router-link>
                </div>
                <div v-else class="d-flex align-items-center">
                    <span class="small me-3 text-muted">Hola, <strong>{{ user.nombre }}</strong></span>
                    <button @click="logout" class="btn btn-outline-danger btn-sm">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <router-view></router-view>

    <footer class="bg-white border-top py-5 mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0">Evaluación final | <strong>MÓDULO 8</strong></p>
            <small class="text-secondary">Desarrollado con Vue.js, Bootstrap y Firebase Ready</small>
        </div>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
